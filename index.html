<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Us: Deep Talk 🤍</title>
    <style>
        :root {
            --cat1: #4ade80; --cat2: #facc15; --cat3: #fb923c; 
            --cat4: #60a5fa; --cat5: #c084fc; --cat6: #f472b6;
            --cat7: #2dd4bf; --cat8: #94a3b8; --random: #ef4444; --dark: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark);
        }

        .container {
            width: 92%;
            max-width: 420px;
            background: white;
            padding: 2.5rem 1.5rem;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 { font-size: 1.7rem; margin-bottom: 0.5rem; color: #1e293b; }
        p.subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 2rem; line-height: 1.5; }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .btn-category {
            border: none;
            padding: 16px 8px;
            border-radius: 18px;
            color: white;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn-random {
            grid-column: span 2;
            background: var(--random);
            padding: 18px;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .btn-category:active { transform: translateY(2px); box-shadow: none; }

        #game-screen { display: none; }

        .cat-tag {
            font-size: 0.7rem;
            font-weight: 800;
            color: #94a3b8;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .paper-roll {
            width: 90px;
            height: 90px;
            background: #fffde7;
            border: 4px solid #fde047;
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .shaking { animation: shake 0.4s infinite; }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(8deg) scale(1.1); }
            75% { transform: rotate(-8deg) scale(1.1); }
            100% { transform: rotate(0deg); }
        }

        .question-box {
            display: none;
            background: #fff;
            padding: 30px 20px;
            border: 2px solid #f1f5f9;
            border-radius: 25px;
            margin: 20px 0;
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.6;
            min-height: 120px;
            align-items: center;
            justify-content: center;
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .action-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-main { background: var(--dark); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: 700; font-size: 1rem; cursor: pointer; }
        .btn-back { background: transparent; color: #cbd5e1; border: none; padding: 10px; font-size: 0.8rem; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h1>Us: Deep Talk 🤍</h1>
        <p class="subtitle">Pilih topik obrolan buat kita bahas bareng.</p>
        <div class="menu-grid">
            <button class="btn-category" style="background: var(--cat1)" onclick="startGame('daily')">🍃 <span>Daily Story</span></button>
            <button class="btn-category" style="background: var(--cat2)" onclick="startGame('feeling')">💛 <span>Feeling & Space</span></button>
            <button class="btn-category" style="background: var(--cat3)" onclick="startGame('pov')">👀 <span>Our Perspective</span></button>
            <button class="btn-category" style="background: var(--cat4)" onclick="startGame('talk')">📱 <span>Communication</span></button>
            <button class="btn-category" style="background: var(--cat5)" onclick="startGame('bonding')">🔗 <span>Bonding Time</span></button>
            <button class="btn-category" style="background: var(--cat6)" onclick="startGame('love')">✨ <span>Care & Effort</span></button>
            <button class="btn-category" style="background: var(--cat7)" onclick="startGame('flirty')">😏 <span>Playful Vibe</span></button>
            <button class="btn-category" style="background: var(--cat8)" onclick="startGame('real')">🧩 <span>Our Reality</span></button>
            <button class="btn-category btn-random" onclick="startGame('random')">🎲 RANDOM QUESTION</button>
        </div>
    </div>

    <div id="game-screen">
        <div class="cat-tag" id="cat-title">KATEGORI</div>
        <div id="paper" class="paper-roll">✨</div>
        <div id="question-display" class="question-box"></div>
        <div class="action-btns">
            <button id="btn-draw" class="btn-main" onclick="drawQuestion()">Buka Gulungan</button>
            <button class="btn-back" onclick="backToMenu()">Kembali ke Menu</button>
        </div>
    </div>
</div>

<script>
    const questionsBase = {

            "hari ini lebih banyak momen yang bikin kamu ketawa atau malah banyak yang bikin bete?",
            "dari semua yang terjadi hari ini, ada gak satu hal kecil yang bikin kamu senyum sendiri?",
            "hari ini kamu lagi ngerasa lebih ke “semangat ngejalanin hari” atau lebih ke “yang penting jalan dulu aja”? 😆",
            "tadi aktivitas kamu sepanjang hari itu lebih ke hectic banget atau masih santai?",
            "hari ini kamu lagi pengen lebih banyak cerita atau lebih pengen aku yang cerita?",
            "dari hari ini, ada gak hal yang sempet bikin kamu kesel atau kepikiran?",
            "kalau disimpulin dalam satu kalimat, hari ini versi kamu itu kayak gimana?",
            "hari ini kamu lagi butuh ditemenin ngobrol atau pengen recharge sendiri dulu?",
            "kalau aku ada di hari kamu tadi, bagian mana yang pengen kamu share ke aku?"
        ],
        feeling: [
            "kalau kamu lagi capek banget, biasanya kamu lebih pengen ditemenin atau lebih nyaman dikasih waktu sendiri dulu?",
            "setiap kamu cerita ke aku, kamu lebih ngerasa pengen didengerin aja atau sebenernya pengen dibantu cari solusi juga?",
            "setelah kamu cerita, biasanya kamu ngerasa lebih lega atau masih ada yang kepikiran?",
            "kalau kamu lagi bad mood, respon kayak gimana sih yang paling bikin kamu ngerasa “oh ini enak”?",
            "kamu lebih nyaman kalau aku nanya dulu ke kamu, atau kamu lebih suka cerita sendiri kalau lagi pengen?",
            "kalau kamu lagi tiba-tiba diem, itu biasanya karena lagi capek, lagi mikir, atau emang lagi pengen sendiri aja?",
            "kamu termasuk orang yang butuh banyak waktu sendiri gak sih, atau justru lebih suka ditemenin?",
            "kalau soal kangen, kamu tipe yang gampang kangen atau santai aja?",
            "kamu lebih nyaman komunikasi yang sering tapi santai, atau gak sering tapi pas?",
            "sejauh ini, kamu ngerasa nyaman gak sih buat cerita apa aja ke aku?"
        ],
        pov: [
            "kalau kamu lihat aku selama ini, kamu ngerasa aku orangnya lebih ke santai, serius, atau di tengah-tengah?",
            "menurut kamu, selama ini aku lebih banyak cerita atau justru lebih banyak nanya?",
            "aku keliatan sebagai orang yang gampang dipahami atau masih suka bikin kamu bingung?",
            "menurut kamu effort yang aku kasih itu udah pas atau kadang kerasa berlebihan?",
            "kamu ngerasa aku itu lebih ke nenangin kamu atau kadang malah bikin kamu mikir lebih jauh?",
            "kalau dari cara aku ngobrol, aku keliatan lebih cerewet atau justru santai aja?",
            "kamu ngerasa aku orangnya konsisten gak sih dari awal sampai sekarang?",
            "menurut kamu aku lebih dominan atau lebih ngikut flow aja?",
            "aku keliatan orangnya ribet atau sebenarnya cukup simple?",
            "kalau kamu harus deskripsiin aku ke orang lain, kamu bakal bilang aku orangnya gimana?"
        ],
        talk: [
            "menurut kamu, komunikasi yang ideal itu yang tiap hari intens atau yang santai tapi tetap nyambung?",
            "kalau kamu lagi sibuk atau capek, kamu lebih nyaman dichat pelan-pelan atau mending nanti aja?",
            "kalau kamu lama gak bales, kamu lebih pengen aku nanya atau cukup tunggu aja?",
            "kamu lebih nyaman aku fast response terus atau santai aja sesuai kondisi?",
            "kalau kamu lagi capek banget, kamu pengen tetap ditemenin chat atau pengen didiemin dulu?",
            "sejauh ini, kamu ngerasa cara kita komunikasi udah pas atau masih ada yang perlu disesuaikan?",
            "kamu lebih suka kita ngobrol sering atau ada jeda biar gak capek?",
            "waktu kita call tapi diem, kamu ngerasa itu nyaman atau awkward?",
            "menurut kamu dead air itu sesuatu yang aneh atau justru tanda udah nyaman?",
            "kalau kamu lagi kangen, kamu tipe yang langsung bilang atau lebih dipendem?"
        ],
        bonding: [
            "kalau kamu inget pertama kali kita kenal, first impression kamu ke aku waktu itu gimana?",
            "setelah kita jalan sejauh ini, impression kamu ke aku berubah gak?",
            "dari semua momen kita, mana yang paling kamu inget sampai sekarang?",
            "ada gak hal kecil dari aku yang ternyata kamu notice dan kamu suka?",
            "sejauh ini kamu ngerasa nyaman gak sih jalanin ini sama aku?",
            "kamu ngerasa kita ini termasuk cepet deket atau biasa aja?",
            "kamu lebih suka momen kita ngobrol panjang atau justru yang diem tapi bareng?",
            "kamu ngerasa kita nyambung gak sih secara vibe?",
            "sejauh ini kamu enjoy gak jalanin ini bareng aku?",
            "kalau disuruh deskripsiin hubungan kita sekarang, menurut kamu lagi di fase apa?"
        ],
        love: [
            "kamu biasanya lebih ngerasa diperhatiin dari hal kecil sehari-hari atau gesture yang besar?",
            "kamu lebih suka ditemenin secara presence atau dibantu secara tindakan?",
            "sejauh ini kamu ngerasa aku cukup care ke kamu belum?",
            "kamu lebih nyaman aku selalu ada atau secukupnya aja tapi konsisten?",
            "menurut kamu perhatian itu penting gak sih dalam hubungan?",
            "kamu lebih suka diingetin hal kecil atau dibiarkan mandiri aja?",
            "menurut kamu effort dalam hubungan itu bentuknya kayak gimana?",
            "kamu ngerasa apa yang aku kasih selama ini udah pas atau kebanyakan?",
            "kamu nyaman gak sih kalau aku perhatian ke kamu kayak sekarang?",
            "hal kecil apa yang bikin kamu ngerasa “aku dihargai banget”?"
        ],
        flirty: [
            "kamu lebih suka aku yang suka jahil atau yang serius?",
            "kalau aku puji kamu, kamu lebih seneng atau malah jadi malu?",
            "kamu tipe yang gengsi nunjukin perasaan atau santai aja?",
            "kamu suka gak sih waktu aku manggil kamu “cantik”? 😏",
            "menurut kamu aku ini orangnya lucu atau biasa aja jujur?",
            "kalau aku godain terus, kamu kesel atau justru suka?",
            "kamu lebih suka aku cerewet atau kalem?",
            "kalau aku tiba-tiba diem, kamu bakal kepikiran gak?",
            "kamu gampang kehibur gak sih sama hal-hal kecil?",
            "kamu lebih suka bercanda yang receh atau yang random banget?"
        ],
        real: [
            "waktu kita call lama tapi banyak diem, kamu ngerasa itu nyaman atau aneh?",
            "menurut kamu frekuensi kita call sekarang itu terlalu sering atau pas?",
            "kamu ngerasa kita deketnya termasuk cepet gak sih?",
            "kamu lebih suka flow kita sekarang atau pengen lebih pelan?",
            "kamu ngerasa aku terlalu available atau masih wajar?",
            "kamu lebih suka aku yang sering initiate atau gantian?",
            "kalau aku gak mulai duluan, kamu bakal mulai gak?",
            "kamu ngerasa effort kita berdua udah seimbang atau belum?",
            "kamu ngerasa hubungan ini berjalan balance gak?",
            "menurut kamu, hal apa yang penting banget kita jaga biar tetap nyaman kayak sekarang?"
        ]
    };

    let activeQueue = [];
    const specialQuest = "menurut kamu kita perlu ada waktu buat telfon tiap hari gak?";

    function startGame(cat) {
        let tempArr = [];
        let title = "";

        if (cat === 'random') {
            Object.values(questionsBase).forEach(list => tempArr.push(...list));
            title = "RANDOM MIX";
        } else {
            tempArr = [...questionsBase[cat]];
            const catMap = {
                daily: "Daily Story", feeling: "Feeling & Space", pov: "Our Perspective",
                talk: "Communication", bonding: "Bonding Time", love: "Care & Effort",
                flirty: "Playful Vibe", real: "Our Reality"
            };
            title = catMap[cat];
        }

        tempArr.sort(() => Math.random() - 0.5);

        const targetIndex = Math.random() < 0.5 ? 1 : 3;
        tempArr = tempArr.filter(q => q !== specialQuest);
        tempArr.splice(targetIndex, 0, specialQuest);
        
        activeQueue = tempArr;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('cat-title').innerText = title;
        resetUI();
    }

    function drawQuestion() {
        if (activeQueue.length === 0) {
            alert("Obrolan topik ini sudah selesai kita bahas ✨");
            backToMenu();
            return;
        }

        const paper = document.getElementById('paper');
        const qBox = document.getElementById('question-display');
        const btn = document.getElementById('btn-draw');

        qBox.style.display = 'none';
        btn.disabled = true;
        paper.classList.add('shaking');
        paper.innerText = "🎲";

        setTimeout(() => {
            paper.classList.remove('shaking');
            paper.innerText = "📜";
            
            const picked = activeQueue.shift();
            qBox.innerText = picked;
            qBox.style.display = 'flex';
            btn.disabled = false;
            btn.innerText = "Lanjut (" + activeQueue.length + ")";
        }, 1200);
    }

    function resetUI() {
        document.getElementById('question-display').style.display = 'none';
        document.getElementById('paper').innerText = "✨";
        document.getElementById('btn-draw').innerText = "Buka Gulungan";
    }

    function backToMenu() {
        document.getElementById('setup-screen').style.display = 'block';
        document.getElementById('game-screen').style.display = 'none';
    }
</script>

</body>
</html>
