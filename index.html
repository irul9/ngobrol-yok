<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Us: Together 💙</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            --glass: rgba(255, 255, 255, 0.8);
            --accent-blue: #3b82f6;
            --text-main: #1e3a8a;
            
            /* Category Colors */
            --c1: #60a5fa; --c2: #fb7185; --c3: #34d399; 
            --c4: #818cf8; --c5: #fbbf24; --c6: #a78bfa;
            --c7: #2dd4bf; --c8: #f472b6; --c9: #fb923c;
            --c-rand: #f87171;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 2.5rem 1.5rem;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; font-weight: 800; letter-spacing: -0.5px; }
        .subtitle { font-size: 0.9rem; opacity: 0.7; margin-bottom: 2rem; font-weight: 500; }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-cat {
            aspect-ratio: 1/1;
            border: none;
            border-radius: 25px;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            position: relative;
        }

        .btn-cat:hover { transform: scale(1.1) rotate(5deg); }
        .btn-cat:active { transform: scale(0.9); }

        .btn-random {
            grid-column: span 3;
            aspect-ratio: auto;
            padding: 15px;
            border-radius: 20px;
            background: var(--c-rand);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            margin-top: 10px;
        }

        /* Game Screen */
        #game-screen { display: none; }

        .paper-zone {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
            position: relative;
        }

        .shaking { animation: playfulShake 0.4s infinite ease-in-out; }

        @keyframes playfulShake {
            0% { transform: scale(1) rotate(0); }
            25% { transform: scale(1.1) rotate(10deg); }
            50% { transform: scale(1.05) rotate(-10deg); }
            75% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1) rotate(0); }
        }

        .question-card {
            background: white;
            padding: 30px 20px;
            border-radius: 30px;
            min-height: 160px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.5;
            color: #334155;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
            animation: cardPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cardPop {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .controls { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }
        .btn-primary {
            background: var(--accent-blue);
            color: white; border: none; padding: 18px; border-radius: 22px;
            font-weight: 800; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
            transition: all 0.3s;
        }
        .btn-primary:active { transform: translateY(3px); box-shadow: none; }
        .btn-text { background: transparent; border: none; color: #64748b; font-weight: 600; cursor: pointer; padding: 10px; }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="container" id="main-container">
    <div id="menu-screen">
        <h1>Us Together 💙</h1>
        <p class="subtitle">Pick a vibe to start chatting!</p>
        <div class="menu-grid">
            <button class="btn-cat" style="background: var(--c1)" onclick="start('daily')">🌤️</button>
            <button class="btn-cat" style="background: var(--c2)" onclick="start('feeling')">🫶</button>
            <button class="btn-cat" style="background: var(--c3)" onclick="start('pov')">🧠</button>
            <button class="btn-cat" style="background: var(--c4)" onclick="start('ldr')">📱</button>
            <button class="btn-cat" style="background: var(--c5)" onclick="start('home')">👨‍👩‍👧</button>
            <button class="btn-cat" style="background: var(--c6)" onclick="start('friends')">🧑‍🤝‍🧑</button>
            <button class="btn-cat" style="background: var(--c7)" onclick="start('school')">🎒</button>
            <button class="btn-cat" style="background: var(--c8)" onclick="start('rare')">💛</button>
            <button class="btn-cat" style="background: var(--c9)" onclick="start('filter')">😏</button>
            <button class="btn-cat btn-random" onclick="start('random')">🎲 Random Mix</button>
        </div>
    </div>

    <div id="game-screen">
        <div class="cat-tag" id="game-title" style="font-weight: 800; color: var(--accent-blue); margin-bottom: 10px;">VIBE</div>
        <div class="paper-zone" id="paper">✨</div>
        <div class="question-card" id="q-card"></div>
        <div class="controls">
            <button class="btn-primary" id="draw-btn" onclick="draw()">Buka Gulungan</button>
            <button class="btn-text" onclick="home()">Back to Home</button>
        </div>
    </div>
</div>

<script>
    const data = {
        daily: ["kalau lagi capek banget, biasanya kamu tipe yang tetap jalanin atau butuh pause dulu?", "hari kamu tuh lebih sering capek fisik atau capek pikiran?", "aktivitas yang paling kamu nikmatin walaupun simple itu apa?", "kamu tipe orang yang suka rutinitas atau lebih suka yang random?", "kalau lagi bad day, biasanya kamu ngapain biar balik normal lagi?", "kamu lebih produktif pagi, siang, atau malam?", "hal kecil apa di hari kamu yang paling sering bikin kamu kesel tapi jarang kamu ceritain?", "kamu lebih suka hari yang sibuk atau hari yang santai banget?", "kalau hari kamu difilmkan, bagian mana yang paling seru menurut kamu?", "kamu tipe yang butuh “me time” gak sih?"],
        feeling: ["kalau lagi capek, kamu lebih pengen ditemenin atau sendiri dulu?", "kamu kalau cerita ke orang, lebih pengen didenger atau dibantu cari solusi?", "kamu gampang cerita ke orang atau butuh waktu dulu?", "kamu ngerasa lega gak sih setelah cerita ke aku?", "kalau lagi bad mood, kamu lebih pengen dihibur atau didiemin?", "kamu kalau lagi diem biasanya lagi mikir atau lagi cape aja?", "kamu tipe yang gampang kangen atau santai aja?", "kamu kalau lagi overthinking biasanya ngapain?", "kamu ngerasa nyaman gak sih jadi diri sendiri di depan aku?", "kamu kalau lagi capek lebih butuh kata-kata atau tindakan?"],
        pov: ["menurut kamu aku orangnya lebih ke santai, serius, atau campuran?", "aku keliatan orangnya gampang dipahami atau suka bikin bingung?", "kamu ngerasa aku terlalu effort atau masih normal?", "aku keliatan clingy gak sih jujur?", "kamu ngerasa aku nenangin atau malah bikin kamu mikir?", "menurut kamu aku orangnya konsisten gak?", "kamu ngerasa aku terlalu sering initiate atau justru pas?", "kamu lebih nyaman aku kayak sekarang atau lebih santai lagi?", "kamu ngerasa aku cukup ngerti kamu belum?", "kalau disuruh deskripsiin aku ke orang lain, kamu bakal bilang aku kayak gimana?"],
        ldr: ["menurut kamu LDR itu yang paling susah di bagian mana?", "kamu lebih butuh komunikasi sering atau yang penting berkualitas?", "kamu kalau lagi kangen biasanya pengen ngapain?", "kamu nyaman gak sih kalau kita call tapi diem-diem aja?", "kamu tipe yang kalau kangen langsung bilang atau dipendem?", "menurut kamu idealnya kita call seberapa sering?", "kamu kalau lagi sibuk pengen tetap dichat atau nanti aja?", "kamu ngerasa komunikasi kita sekarang udah pas belum?", "kamu kalau lagi ilang (sibuk/tidur), pengennya aku gimana?", "menurut kamu biar LDR kita tetep enak, hal apa yang paling penting dijaga?", "kamu ngerasa kita terlalu cepat atau masih normal?", "kamu lebih suka kita kayak sekarang atau lebih slow?", "kamu kalau aku gak chat duluan bakal nyariin gak?", "menurut kamu, hal kecil apa yang bisa bikin hubungan kita tetap hangat walaupun jauh?", "kamu lebih butuh kehadiran (call/chat) atau rasa “ada” walaupun gak terus ngobrol?"],
        home: ["kamu dekat gak sih sama orang tua kamu?", "kamu kalau ada masalah biasanya cerita ke orang tua atau enggak?", "hal apa yang paling kamu harapin dari orang tua kamu?", "ada gak hal yang pengen banget kamu denger dari orang tua tapi jarang diucapin?", "kamu lebih dekat ke ibu atau ayah?", "suasana rumah kamu lebih ke santai atau strict?", "kamu tipe yang terbuka ke keluarga atau lebih banyak simpen sendiri?", "ada gak kebiasaan keluarga kamu yang kamu suka banget?", "kalau lagi capek, rumah itu jadi tempat nyaman atau malah biasa aja?", "kamu ngerasa keluarga kamu ngerti kamu belum?"],
        friends: ["kamu tipe yang punya banyak temen atau circle kecil?", "kamu biasanya jadi yang banyak cerita atau pendengar?", "kamu gampang percaya sama orang atau selektif?", "di circle kamu, kamu lebih sering update atau malah ketinggalan info? 😆", "kamu kalau lagi ada masalah lebih milih cerita ke temen atau simpen sendiri?", "kamu pernah ngerasa gak dimengerti sama temen?", "kamu tipe yang suka nongkrong atau lebih suka di rumah?", "menurut kamu temen yang ideal itu kayak gimana?", "kamu gampang nyaman sama orang baru gak?", "kamu lebih suka hubungan yang intens atau santai aja?"],
        school: ["waktu sekolah kamu tipe yang aktif atau biasa aja?", "pelajaran yang paling kamu suka dulu apa?", "kamu lebih suka masa sekolah atau sekarang?", "kamu tipe yang banyak temen di sekolah atau sedikit tapi dekat?", "ada momen sekolah yang paling kamu inget sampai sekarang?", "kamu dulu lebih fokus belajar atau santai?", "kamu pernah punya fase awkward di sekolah? 😆", "guru yang paling kamu inget itu kayak gimana?", "kamu tipe yang ikut organisasi atau enggak?", "masa sekolah kamu lebih banyak drama atau chill?"],
        rare: ["hal kecil apa yang berarti banget buat kamu tapi jarang orang notice?", "kamu ngerasa paling dihargai itu dari hal apa?", "hal kecil apa yang bisa bikin mood kamu langsung naik?", "kamu lebih suka diperhatiin lewat kata-kata atau tindakan kecil?", "ada gak hal yang kamu pengen orang ngerti tentang kamu tanpa kamu harus jelasin?", "kamu lebih takut kehilangan orang atau kehilangan rasa?", "kamu tipe yang gampang memaafkan atau butuh waktu?", "hal kecil apa yang bikin kamu ngerasa “aku disayang”?", "kamu lebih suka hubungan yang tenang atau yang penuh excitement?", "kamu tipe yang kalau sayang nunjukin atau dipendem?"],
        filter: ["kalau kamu bisa jujur 100% tanpa takut disalahpahami, apa yang pengen kamu bilang ke aku?", "ada gak hal yang kamu pengen tanyain ke aku tapi belum sempet?", "kamu pernah kepikiran sesuatu tentang aku tapi gak kamu bilang?", "kamu ngerasa ada hal yang masih belum kamu tau dari aku?", "kamu lebih suka aku kayak sekarang atau ada yang pengen kamu ubah?", "kamu pernah ragu sama aku gak?", "kamu ngerasa kita udah di jalur yang bener belum?", "ada gak hal kecil dari aku yang sebenernya kamu notice tapi gak pernah bilang?", "kamu ngerasa nyaman sepenuhnya belum sama aku?", "kalau hubungan ini mau dibawa serius, hal apa yang paling penting buat kamu?"]
    };

    let queue = [];
    const special = "menurut kamu kita perlu ada waktu buat telfon tiap hari gak?";

    function start(cat) {
        let pool = [];
        let label = "";
        if(cat === 'random') {
            Object.values(data).forEach(a => pool.push(...a));
            label = "🎲 Random Mix";
        } else {
            pool = [...data[cat]];
            const titles = {daily:"🌤️ Daily", feeling:"🫶 Feeling", pov:"🧠 Perspective", ldr:"📱 LDR Talk", home:"🏠 Home", friends:"🧑‍🤝‍🧑 Friends", school:"🎒 School", rare:"💛 Rare", filter:"😏 Filter"};
            label = titles[cat];
        }

        pool.sort(() => Math.random() - 0.5);
        const idx = Math.random() < 0.5 ? 1 : 3;
        pool = pool.filter(q => q !== special);
        pool.splice(idx, 0, special);

        queue = pool;
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('game-title').innerText = label;
        resetUI();
    }

    function draw() {
        if(queue.length === 0) {
            alert("Habis! Pilih topik lain yuk? ✨");
            home(); return;
        }

        const p = document.getElementById('paper');
        const c = document.getElementById('q-card');
        const b = document.getElementById('draw-btn');

        c.style.display = 'none';
        b.disabled = true;
        p.innerText = "🌀";
        p.classList.add('shaking');

        setTimeout(() => {
            p.classList.remove('shaking');
            p.innerText = "📜";
            const pick = queue.shift();
            c.innerText = pick;
            c.style.display = 'flex';
            b.disabled = false;
            b.innerText = "Lanjut Lagi ✨";
        }, 1200);
    }

    function resetUI() {
        document.getElementById('q-card').style.display = 'none';
        document.getElementById('paper').innerText = "✨";
        document.getElementById('draw-btn').innerText = "Buka Gulungan";
        document.getElementById('draw-btn').disabled = false;
    }

    function home() {
        document.getElementById('menu-screen').style.display = 'block';
        document.getElementById('game-screen').style.display = 'none';
    }
</script>

</body>
</html>
