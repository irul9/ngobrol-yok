<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Us: Deep Talk 🤍</title>
    <style>
        :root {
            --cat1: #4ade80; --cat2: #facc15; --cat3: #fb923c; 
            --cat4: #60a5fa; --cat5: #c084fc; --cat6: #f472b6;
            --cat7: #2dd4bf; --cat8: #94a3b8; --random: #ef4444; --dark: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark);
        }

        .container {
            width: 92%;
            max-width: 420px;
            background: white;
            padding: 2.5rem 1.5rem;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 { font-size: 1.7rem; margin-bottom: 0.5rem; color: #1e293b; }
        p.subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 2rem; line-height: 1.5; }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .btn-category {
            border: none;
            padding: 16px 8px;
            border-radius: 18px;
            color: white;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn-random {
            grid-column: span 2;
            background: var(--random);
            padding: 18px;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .btn-category:active { transform: translateY(2px); box-shadow: none; }

        #game-screen { display: none; }

        .cat-tag {
            font-size: 0.7rem;
            font-weight: 800;
            color: #94a3b8;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .paper-roll {
            width: 90px;
            height: 90px;
            background: #fffde7;
            border: 4px solid #fde047;
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .shaking { animation: shake 0.4s infinite; }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(8deg) scale(1.1); }
            75% { transform: rotate(-8deg) scale(1.1); }
            100% { transform: rotate(0deg); }
        }

        .question-box {
            display: none;
            background: #fff;
            padding: 30px 20px;
            border: 2px solid #f1f5f9;
            border-radius: 25px;
            margin: 20px 0;
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.6;
            min-height: 120px;
            align-items: center;
            justify-content: center;
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .action-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-main { background: var(--dark); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: 700; font-size: 1rem; cursor: pointer; }
        .btn-back { background: transparent; color: #cbd5e1; border: none; padding: 10px; font-size: 0.8rem; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h1>Us: Deep Talk 🤍</h1>
        <p class="subtitle">Pilih topik obrolan buat kita bahas bareng.</p>
        <div class="menu-grid">
            <button class="btn-category" style="background: var(--cat1)" onclick="startGame('daily')">🍃 <span>Daily Story</span></button>
            <button class="btn-category" style="background: var(--cat2)" onclick="startGame('feeling')">💛 <span>Feeling & Space</span></button>
            <button class="btn-category" style="background: var(--cat3)" onclick="startGame('pov')">👀 <span>Our Perspective</span></button>
            <button class="btn-category" style="background: var(--cat4)" onclick="startGame('talk')">📱 <span>Communication</span></button>
            <button class="btn-category" style="background: var(--cat5)" onclick="startGame('bonding')">🔗 <span>Bonding Time</span></button>
            <button class="btn-category" style="background: var(--cat6)" onclick="startGame('love')">✨ <span>Care & Effort</span></button>
            <button class="btn-category" style="background: var(--cat7)" onclick="startGame('flirty')">😏 <span>Playful Vibe</span></button>
            <button class="btn-category" style="background: var(--cat8)" onclick="startGame('real')">🧩 <span>Our Reality</span></button>
            <button class="btn-category btn-random" onclick="startGame('random')">🎲 RANDOM QUESTION</button>
        </div>
    </div>

    <div id="game-screen">
        <div class="cat-tag" id="cat-title">KATEGORI</div>
        <div id="paper" class="paper-roll">✨</div>
        <div id="question-display" class="question-box"></div>
        <div class="action-btns">
            <button id="btn-draw" class="btn-main" onclick="drawQuestion()">Buka Gulungan</button>
            <button class="btn-back" onclick="backToMenu()">Kembali ke Menu</button>
        </div>
    </div>
</div>

<script>
    const questionsBase = {
        daily: ["hari ini bagian paling capek dari harimu apa?", "hari ini lebih banyak ketawa atau bete?", "ada kejadian kecil hari ini yang bikin kamu senyum gak?", "hari ini lagi mode 'semangat' atau 'bertahan hidup'? 😆", "tadi kerjaan / aktivitasmu lebih ke hectic atau santai?", "hari ini kamu lagi pengen cerita atau dengerin aja?", "hari ini kamu lagi butuh ditemenin atau sendiri dulu?", "tadi ada hal yang bikin kamu kesel gak?", "hari ini kamu lebih banyak mikir atau jalanin aja?", "kalau disimpulin, hari ini versi kamu itu gimana?"],
        feeling: ["kalau lagi capek, kamu lebih butuh ditemenin atau dikasih space?", "kalau lagi cerita, kamu lebih pengen didenger atau dikasih solusi?", "kamu biasanya lebih lega setelah cerita atau masih kepikiran?", "kalau lagi bad mood, respon kayak gimana yang kamu harapin?", "kamu lebih nyaman kalau ditanya dulu atau cerita sendiri?", "kalau lagi diem, biasanya kamu lagi capek atau lagi mikir?", "kamu tipe yang butuh waktu sendiri gak sih?", "kamu gampang kangen atau santai aja?", "kamu lebih suka komunikasi intens atau secukupnya?", "kamu ngerasa nyaman gak sih sejauh ini buat cerita?"],
        pov: ["menurut kamu aku orangnya lebih santai atau serius?", "menurut kamu aku lebih banyak cerita atau lebih banyak nanya?", "aku keliatan orangnya gampang dipahami gak?", "menurut kamu aku terlalu effort atau pas?", "aku keliatan orangnya nenangin atau bikin mikir?", "menurut kamu aku lebih ke cerewet atau kalem?", "aku keliatan orangnya konsisten gak?", "menurut kamu aku lebih dominan atau santai?", "aku keliatan orangnya ribet atau simple?", "sejauh ini, kamu liat aku sebagai orang yang gimana?"],
        talk: ["kamu lebih nyaman komunikasi tiap hari atau santai aja?", "kalau lagi sibuk, kamu lebih suka dichat atau nanti aja?", "kamu kalau lama gak bales pengennya pasangan respon gimana?", "kamu lebih suka fast response atau fleksibel?", "kamu kalau lagi capek pengen dichat atau didiemin dulu?", "kamu ngerasa komunikasi kita udah pas belum?", "kamu lebih suka kita sering ngobrol atau ada jeda?", "kamu nyaman gak sih kalau kita diem pas call?", "menurut kamu dead air itu awkward atau nyaman?", "kamu tipe yang kalau kangen langsung bilang atau enggak?"],
        bonding: ["first impression kamu ke aku dulu gimana?", "sekarang berubah gak?", "momen paling kamu inget dari kita apa?", "hal kecil dari aku yang kamu suka apa?", "kamu ngerasa nyaman gak sih sama aku?", "kamu ngerasa kita cepet deket gak?", "kamu lebih suka kita ngobrol atau diem bareng?", "kamu ngerasa kita nyambung gak?", "kamu enjoy gak sih sejauh ini?", "menurut kamu hubungan kita sekarang lagi di fase apa?"],
        love: ["kamu lebih ngerasa diperhatiin dari hal kecil atau besar?", "kamu lebih suka ditemenin atau dibantu?", "kamu ngerasa aku care gak sih?", "kamu lebih suka aku ada terus atau secukupnya?", "kamu ngerasa perhatian itu penting gak?", "kamu lebih suka diingetin atau dibiarin?", "kamu ngerasa effort itu bentuknya apa?", "kamu ngerasa aku terlalu banyak ngasih atau pas?", "kamu nyaman gak sih kalau aku perhatian gitu?", "hal kecil apa yang bikin kamu ngerasa dihargai?"],
        flirty: ["kamu lebih suka aku jahil atau serius?", "kamu kalau dipuji seneng atau malu?", "kamu tipe yang gengsi atau cuek?", "kamu suka gak sih aku manggil kamu 'cantik'? 😏", "kamu ngerasa aku lucu gak sih jujur?", "kamu kalau aku godain terus kesel gak?", "kamu lebih suka aku cerewet atau kalem?", "kamu kalau aku tiba-tiba diem bakal kepikiran gak?", "kamu tipe yang gampang kehibur gak?", "kamu lebih suka bercanda receh atau yang random banget?"],
        real: ["kamu nyaman gak sih waktu kita call tapi diem?", "kamu ngerasa kita terlalu sering call atau pas?", "kamu ngerasa kita cepet banget deketnya?", "kamu lebih suka flow kita sekarang atau lebih slow?", "kamu ngerasa aku terlalu available gak?", "kamu lebih suka aku inisiatif terus atau gantian?", "kamu kalau aku gak open duluan bakal open gak?", "kamu ngerasa effort kita udah seimbang belum?", "kamu ngerasa kita balance gak?", "menurut kamu yang perlu kita jaga biar tetap enak itu apa?"]
    };

    let activeQueue = [];
    const specialQuest = "menurut kamu kita perlu ada waktu buat telfon tiap hari gak?";

    function startGame(cat) {
        let tempArr = [];
        let title = "";

        if (cat === 'random') {
            // Gabungkan semua pertanyaan dari semua kategori
            Object.values(questionsBase).forEach(list => tempArr.push(...list));
            title = "RANDOM MIX";
        } else {
            tempArr = [...questionsBase[cat]];
            const catMap = {
                daily: "Daily Story", feeling: "Feeling & Space", pov: "Our Perspective",
                talk: "Communication", bonding: "Bonding Time", love: "Care & Effort",
                flirty: "Playful Vibe", real: "Our Reality"
            };
            title = catMap[cat];
        }

        // Acak urutan
        tempArr.sort(() => Math.random() - 0.5);

        // Sisipkan pertanyaan wajib di urutan ke-2 atau ke-4
        const targetIndex = Math.random() < 0.5 ? 1 : 3;
        // Hapus pertanyaan titipan jika sudah ada di list agar tidak double
        tempArr = tempArr.filter(q => q !== specialQuest);
        tempArr.splice(targetIndex, 0, specialQuest);
        
        activeQueue = tempArr;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('cat-title').innerText = title;
        resetUI();
    }

    function drawQuestion() {
        if (activeQueue.length === 0) {
            alert("Yeay, obrolan topik ini sudah selesai! ✨");
            backToMenu();
            return;
        }

        const paper = document.getElementById('paper');
        const qBox = document.getElementById('question-display');
        const btn = document.getElementById('btn-draw');

        qBox.style.display = 'none';
        btn.disabled = true;
        paper.classList.add('shaking');
        paper.innerText = "🎲";

        setTimeout(() => {
            paper.classList.remove('shaking');
            paper.innerText = "📜";
            
            const picked = activeQueue.shift();
            qBox.innerText = picked;
            qBox.style.display = 'flex';
            btn.disabled = false;
            btn.innerText = "Lanjut (" + activeQueue.length + ")";
        }, 1200);
    }

    function resetUI() {
        document.getElementById('question-display').style.display = 'none';
        document.getElementById('paper').innerText = "✨";
        document.getElementById('btn-draw').innerText = "Buka Gulungan";
    }

    function backToMenu() {
        document.getElementById('setup-screen').style.display = 'block';
        document.getElementById('game-screen').style.display = 'none';
    }
</script>

</body>
</html>
